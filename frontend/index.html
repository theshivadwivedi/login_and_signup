<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="background"></div>

<div class="card">

    <h1>🔐 Login System</h1>
    <p class="subtitle">Secure Authentication Portal</p>

    <div class="tabs">
        <button id="loginTab" class="active" onclick="showLogin()">Login</button>
        <button id="signupTab" onclick="showSignup()">Signup</button>
    </div>

    <!-- Login -->

    <div id="loginForm">

        <label>Email</label>
        <input
            type="email"
            id="login_email"
            placeholder="Enter your email">

        <label>Password</label>
        <input
            type="password"
            id="login_password"
            placeholder="Enter password">

        <button class="main-btn" onclick="login()">
            Login
        </button>

    </div>

    <!-- Signup -->

    <div id="signupForm" style="display:none;">

        <label>Username</label>
        <input
            type="text"
            id="username"
            placeholder="Username">

        <label>Email</label>
        <input
            type="email"
            id="email"
            placeholder="Email">

        <label>Password</label>
        <input
            type="password"
            id="password"
            placeholder="Password">

        <button class="main-btn" onclick="signup()">
            Create Account
        </button>

    </div>

    <p id="message"></p>

</div>

<script src="script.js"></script>

</body>
</html>
